<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏪 My Shops</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap');

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html, body {
  min-height:100%; width:100%;
  font-family:'Nunito Sans', sans-serif;
  background: linear-gradient(160deg, #FFF9F0 0%, #F0FDF4 50%, #FFF9F0 100%);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:30px 20px;
}

.page-title {
  font-family:'Nunito', sans-serif;
  font-weight:900; font-size:32px;
  color:#1E1B4B;
  text-align:center; margin-bottom:6px;
}

.page-sub {
  font-size:15px; color:#6B7280;
  text-align:center; margin-bottom:40px;
}

.shops {
  display:flex; flex-direction:column; gap:18px;
  width:100%; max-width:480px;
}

.shop-card {
  display:flex; align-items:center; gap:18px;
  background:#fff; border-radius:22px;
  padding:20px 22px;
  text-decoration:none;
  border:3px solid transparent;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  transition:transform .15s, box-shadow .15s;
  position:relative; overflow:hidden;
}

.shop-card::before {
  content:'';
  position:absolute; inset:0;
  background:var(--card-color);
  opacity:.06;
}

.shop-card:active {
  transform:scale(.97);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.shop-card.toy   { --card-color:#FF4D4D; border-color:#FF4D4D30; }
.shop-card.fruit { --card-color:#16A34A; border-color:#16A34A30; }
.shop-card.cafe  { --card-color:#D97706; border-color:#D9770630; }

.shop-icon {
  font-size:54px; line-height:1;
  flex-shrink:0;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));
}

.shop-info { flex:1; }

.shop-name {
  font-family:'Nunito', sans-serif;
  font-weight:900; font-size:22px;
  color:#1E1B4B; margin-bottom:3px;
}

.shop-desc {
  font-size:13px; color:#6B7280; line-height:1.4;
}

.shop-tag {
  font-family:'Nunito', sans-serif;
  font-weight:900; font-size:12px;
  padding:4px 10px; border-radius:20px;
  flex-shrink:0;
}
.shop-card.toy   .shop-tag { background:#FEE2E2; color:#DC2626; }
.shop-card.fruit .shop-tag { background:#DCFCE7; color:#15803D; }
.shop-card.cafe  .shop-tag { background:#FEF3C7; color:#B45309; }

.arrow {
  font-size:20px; flex-shrink:0;
  color:#D1D5DB;
}

.footer {
  margin-top:36px;
  font-size:12px; color:#9CA3AF; text-align:center;
}
</style>
</head>
<body>

<div class="page-title">🏪 My Shops</div>
<p class="page-sub">Tap a shop to open the cashier</p>

<div class="shops">

  <a class="shop-card toy" href="toy-shop-cashier.html">
    <span class="shop-icon">🧸</span>
    <div class="shop-info">
      <div class="shop-name">Toy Shop</div>
      <div class="shop-desc">Cars, dolls, robots, blocks and more</div>
    </div>
    <span class="shop-tag">12 items</span>
    <span class="arrow">›</span>
  </a>

  <a class="shop-card fruit" href="fruit-shop-cashier.html">
    <span class="shop-icon">🍎</span>
    <div class="shop-info">
      <div class="shop-name">Fruit Shop</div>
      <div class="shop-desc">Fresh fruit, vegetables & produce</div>
    </div>
    <span class="shop-tag">16 items</span>
    <span class="arrow">›</span>
  </a>

  <a class="shop-card cafe" href="cafe-cashier.html">
    <span class="shop-icon">☕</span>
    <div class="shop-info">
      <div class="shop-name">Breakfast Café</div>
      <div class="shop-desc">Drinks, cooked breakfast & light bites</div>
    </div>
    <span class="shop-tag">16 items</span>
    <span class="arrow">›</span>
  </a>

</div>

<div class="footer">Tap ✏️ Edit Prices inside any shop to customise</div>

</body>
</html>
